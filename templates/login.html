{% load static %}
{% load form_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login to Melon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}"/>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 380px; border-radius: 15px;">
        <h3 class="text-center mb-4" style="font-weight: 600;">Login to Melon 🍈</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username|add_class:"form-control" }}
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password|add_class:"form-control" }}
            </div>

            <button type="submit" class="btn btn-success w-100 py-2">
                Login
            </button>
        </form>

        <p class="mt-3 text-center">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </p>
    </div>

</body>
</html>
