{% extends 'base.html' %}

{% block content %}
    <div class="centered-container">
        <h2>Confirm Logout</h2>
        <p>Are you sure you want to log out?</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Yes, Log Out</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
